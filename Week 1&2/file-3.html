<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</style>
</head>

<body>
    <form>
        <label for="fname">First Name:</label>
        <input TYPE="TEXT" name="fname" id="fname" placeholder="eg.Aaditya">
        <br><br>
        <label for="sname">Last Name:</label>
        <input TYPE="TEXT" name="sname" id="sname">
        <br><br>
        <label for="age">Age:</label>
        <input TYPE="number" name="age" id="age">
        <br><br>
        <label for="pass">Password</label>
        <input type="password" id="pass">
        <br><br>
        <label for="add">
            <h4>Address:</h4>
        </label>
        <textarea name="add" id="address" rows="10" cols="80"></textarea>
        <br><br>
        <h4>Gender:</h4>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="other">Other</label>
        <input type="radio" name="gender" id="other" value="other">
        <label for="sub"><h4>Subjects:</h4></label>
        <label for="eng">English</label>
        <input name="sub" type="checkbox" id="eng" value="english">
        <label for="math">Maths</label>
        <input name="sub" type="checkbox" id="math" value="maths">
        <label for="sci">Science</label>
        <input name="sub" type="checkbox" id="sci" value="science">
        <br><br>
        <label for="fruits">Fruits</label><br>
        <Select id="fruits" name="Fruits">Fruits
        <option value="N/A">--No Option--</option>
        <option value="apple">Apple</option>
        <option value="banana">Banana</option>
        <option value="orange">Orange</option>
        <option value="kiwi">Kiwi</option>
        </Select>
        <br><br>
        <input type="file">
        <br><br>
        <input type="submit" name="submit">
    </form>
</body>

</html>
